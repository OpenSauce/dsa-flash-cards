title: Merge Intervals
difficulty: medium
tags: [array, sorting]
description: |
  Given an array of intervals where each interval is a pair `[start, end]`,
  merge all overlapping intervals and return a list of the non-overlapping
  intervals that cover all the input ranges.

  After sorting by start time, two consecutive intervals overlap if
  the later interval's start is less than or equal to the earlier
  interval's end.
examples:
  - input: "intervals = [[1,3],[2,6],[8,10],[15,18]]"
    output: "[[1,6],[8,10],[15,18]]"
    explanation: "Intervals [1,3] and [2,6] overlap, so they merge into [1,6]."
  - input: "intervals = [[1,4],[4,5]]"
    output: "[[1,5]]"
    explanation: "Intervals [1,4] and [4,5] touch at 4, so they merge."
constraints:
  - "1 <= intervals.length <= 10^4"
  - "intervals[i].length == 2"
  - "0 <= start_i <= end_i <= 10^4"
starter_code:
  python: |
    def merge(intervals: list[list[int]]) -> list[list[int]]:
        pass
  javascript: |
    function merge(intervals) {
    }
  go: |
    func merge(intervals [][]int) [][]int {
    }
  java: |
    public int[][] merge(int[][] intervals) {
    }
test_cases:
  - input: { intervals: [[1, 3], [2, 6], [8, 10], [15, 18]] }
    expected: [[1, 6], [8, 10], [15, 18]]
  - input: { intervals: [[1, 4], [4, 5]] }
    expected: [[1, 5]]
  - input: { intervals: [[1, 4], [0, 4]] }
    expected: [[0, 4]]
  - input: { intervals: [[1, 2]] }
    expected: [[1, 2]]
solution:
  python: |
    def merge(intervals: list[list[int]]) -> list[list[int]]:
        intervals.sort(key=lambda x: x[0])
        merged = [intervals[0]]
        for start, end in intervals[1:]:
            if start <= merged[-1][1]:
                merged[-1][1] = max(merged[-1][1], end)
            else:
                merged.append([start, end])
        return merged
  javascript: |
    function merge(intervals) {
        intervals.sort((a, b) => a[0] - b[0]);
        const merged = [intervals[0]];
        for (let i = 1; i < intervals.length; i++) {
            const last = merged[merged.length - 1];
            if (intervals[i][0] <= last[1]) {
                last[1] = Math.max(last[1], intervals[i][1]);
            } else {
                merged.push(intervals[i]);
            }
        }
        return merged;
    }
  go: |
    func merge(intervals [][]int) [][]int {
        for i := 1; i < len(intervals); i++ {
            key := intervals[i]
            j := i - 1
            for j >= 0 && intervals[j][0] > key[0] {
                intervals[j+1] = intervals[j]
                j--
            }
            intervals[j+1] = key
        }
        merged := [][]int{intervals[0]}
        for _, interval := range intervals[1:] {
            last := merged[len(merged)-1]
            if interval[0] <= last[1] {
                if interval[1] > last[1] {
                    last[1] = interval[1]
                }
            } else {
                merged = append(merged, interval)
            }
        }
        return merged
    }
  java: |
    public int[][] merge(int[][] intervals) {
        Arrays.sort(intervals, (a, b) -> a[0] - b[0]);
        List<int[]> merged = new ArrayList<>();
        merged.add(intervals[0]);
        for (int i = 1; i < intervals.length; i++) {
            int[] last = merged.get(merged.size() - 1);
            if (intervals[i][0] <= last[1]) {
                last[1] = Math.max(last[1], intervals[i][1]);
            } else {
                merged.add(intervals[i]);
            }
        }
        return merged.toArray(new int[merged.size()][]);
    }
hints:
  - "If the intervals were sorted by start time, how would you detect overlaps?"
  - "Sort by start time, then iterate. If the current interval's start is less than or equal to the previous interval's end, they overlap — extend the previous interval's end if needed. Otherwise, start a new group."
