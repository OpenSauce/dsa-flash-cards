test_cases:
  - input: { numbers: [2, 7, 11, 15], target: 9 }
    expected: [1, 2]
  - input: { numbers: [2, 3, 4], target: 6 }
    expected: [1, 3]
  - input: { numbers: [-1, 0], target: -1 }
    expected: [1, 2]
  - input: { numbers: [1, 2, 3, 4, 4, 9, 56, 90], target: 8 }
    expected: [4, 5]
  - input: { numbers: [5, 25, 75], target: 100 }
    expected: [2, 3]
solution:
  python: |
    def two_sum(numbers: list[int], target: int) -> list[int]:
        left, right = 0, len(numbers) - 1
        while left < right:
            s = numbers[left] + numbers[right]
            if s == target:
                return [left + 1, right + 1]
            elif s < target:
                left += 1
            else:
                right -= 1
        return []
  javascript: |
    function twoSum(numbers, target) {
        let left = 0, right = numbers.length - 1;
        while (left < right) {
            const s = numbers[left] + numbers[right];
            if (s === target) {
                return [left + 1, right + 1];
            } else if (s < target) {
                left++;
            } else {
                right--;
            }
        }
        return [];
    }
  go: |
    func twoSum(numbers []int, target int) []int {
        left, right := 0, len(numbers)-1
        for left < right {
            s := numbers[left] + numbers[right]
            if s == target {
                return []int{left + 1, right + 1}
            } else if s < target {
                left++
            } else {
                right--
            }
        }
        return nil
    }
  java: |
    public int[] twoSum(int[] numbers, int target) {
        int left = 0, right = numbers.length - 1;
        while (left < right) {
            int s = numbers[left] + numbers[right];
            if (s == target) {
                return new int[]{left + 1, right + 1};
            } else if (s < target) {
                left++;
            } else {
                right--;
            }
        }
        return new int[]{};
    }
hints:
  - "Since the array is sorted, the sum of two elements gives you information about which direction to search."
  - "Place one pointer at the start and one at the end. If their sum is too small, move the left pointer right. If too large, move the right pointer left."
