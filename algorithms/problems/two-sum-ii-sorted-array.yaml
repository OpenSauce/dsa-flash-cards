title: Two Sum II - Sorted Array
difficulty: medium
tags: [two-pointers, array]
description: |
  Given a 1-indexed array of integers `numbers` that is already sorted in
  non-decreasing order, find two numbers that add up to a specific `target`.
  Return the indices of the two numbers (1-indexed) as an array `[index1, index2]`
  where `index1 < index2`.

  Each input has exactly one solution. You may not use the same element twice.
  Your solution must use only constant extra space.
examples:
  - input: "numbers = [2,7,11,15], target = 9"
    output: "[1,2]"
    explanation: "numbers[1] + numbers[2] = 2 + 7 = 9."
  - input: "numbers = [2,3,4], target = 6"
    output: "[1,3]"
    explanation: "numbers[1] + numbers[3] = 2 + 4 = 6."
constraints:
  - "2 <= numbers.length <= 3 * 10^4"
  - "-1000 <= numbers[i] <= 1000"
  - "numbers is sorted in non-decreasing order."
  - "Exactly one solution exists."
starter_code:
