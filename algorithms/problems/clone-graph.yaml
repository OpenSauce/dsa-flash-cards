test_cases:
  - input: { adj: [[2, 4], [1, 3], [2, 4], [1, 3]] }
    expected: [[2, 4], [1, 3], [2, 4], [1, 3]]
  - input: { adj: [[]] }
    expected: [[]]
  - input: { adj: [] }
    expected: []
  - input: { adj: [[2], [1]] }
    expected: [[2], [1]]
  - input: { adj: [[2, 3], [1, 3], [1, 2]] }
    expected: [[2, 3], [1, 3], [1, 2]]
solution:
  python: |
    def clone_graph(adj: list[list[int]]) -> list[list[int]]:
        if not adj:
            return []
        result = []
        for neighbors in adj:
            result.append(list(neighbors))
        return result
  javascript: |
    function cloneGraph(adj) {
      if (adj.length === 0) return [];
      const result = [];
      for (const neighbors of adj) {
        result.push([...neighbors]);
      }
      return result;
    }
  go: |
    package main

    func cloneGraph(adj [][]int) [][]int {
        if len(adj) == 0 {
            return [][]int{}
        }
        result := make([][]int, len(adj))
        for i, neighbors := range adj {
            result[i] = make([]int, len(neighbors))
            copy(result[i], neighbors)
        }
        return result
    }
  java: |
    public int[][] cloneGraph(int[][] adj) {
        if (adj.length == 0) return new int[0][];
        int[][] result = new int[adj.length][];
        for (int i = 0; i < adj.length; i++) {
            result[i] = new int[adj[i].length];
            System.arraycopy(adj[i], 0, result[i], 0, adj[i].length);
        }
        return result;
    }
hints:
  - "Think about how to track which nodes you have already cloned so you do not create duplicates."
  - "Use a hash map from original node to cloned node. Traverse the graph with BFS or DFS, cloning each neighbor on first visit."
  - "With adjacency list input, deep-cloning means creating new lists for each node's neighbor set."
