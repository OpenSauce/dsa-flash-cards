title: Clone Graph
difficulty: medium
tags: [graph, bfs, dfs]
description: |
  Given a reference to a node in an undirected connected graph,
  return a deep copy (clone) of the entire graph.

  The graph is represented as an adjacency list. Each node has a value
  and a list of its neighbors. The input is given as an adjacency list
  where `adj[i]` contains the neighbor indices (1-indexed) of node `i+1`.
  Return the adjacency list of the cloned graph in the same format.

  If the graph is empty (no nodes), return an empty list.
examples:
  - input: "adj = [[2,4],[1,3],[2,4],[1,3]]"
    output: "[[2,4],[1,3],[2,4],[1,3]]"
    explanation: "Four nodes forming a cycle 1-2-3-4-1. The clone has the same structure."
  - input: "adj = [[]]"
    output: "[[]]"
    explanation: "A single node with no neighbors."
  - input: "adj = []"
    output: "[]"
    explanation: "Empty graph."
constraints:
  - "0 <= number of nodes <= 100"
  - "1 <= Node.val <= 100"
  - "There are no duplicate edges or self-loops."
  - "The graph is connected."
starter_code:
