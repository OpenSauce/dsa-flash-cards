title: Longest Repeating Character Replacement
difficulty: medium
tags: [sliding-window, string]
description: |
  Given a string `s` consisting of uppercase English letters and an integer
  `k`, you can choose any character in the string and change it to any other
  uppercase letter. You can perform this operation at most `k` times.

  Return the length of the longest substring containing the same letter you
  can get after performing at most `k` replacements.
examples:
  - input: "s = 'ABAB', k = 2"
    output: "4"
    explanation: "Replace both A's with B's (or both B's with A's) to get a string of 4 identical characters."
  - input: "s = 'AABABBA', k = 1"
    output: "4"
    explanation: "Replace the B at index 3 to get 'AAAAABA', giving a substring of length 4."
constraints:
  - "1 <= s.length <= 10^5"
  - "s consists of only uppercase English letters."
  - "0 <= k <= s.length"
starter_code:
  python: |
    def character_replacement(s: str, k: int) -> int:
        pass
  javascript: |
    function characterReplacement(s, k) {
    }
  go: |
    func characterReplacement(s string, k int) int {
        return 0
    }
  java: |
    public int characterReplacement(String s, int k) {
        return 0;
    }
test_cases:
  - input: { s: "ABAB", k: 2 }
    expected: 4
  - input: { s: "AABABBA", k: 1 }
    expected: 4
  - input: { s: "AAAA", k: 0 }
    expected: 4
  - input: { s: "ABCDE", k: 1 }
    expected: 2
  - input: { s: "A", k: 0 }
    expected: 1
solution:
  python: |
    def character_replacement(s: str, k: int) -> int:
        counts = {}
        left = 0
        max_freq = 0
        result = 0
        for right in range(len(s)):
            counts[s[right]] = counts.get(s[right], 0) + 1
            max_freq = max(max_freq, counts[s[right]])
            while (right - left + 1) - max_freq > k:
                counts[s[left]] -= 1
                left += 1
            result = max(result, right - left + 1)
        return result
  javascript: |
    function characterReplacement(s, k) {
        const counts = {};
        let left = 0, maxFreq = 0, result = 0;
        for (let right = 0; right < s.length; right++) {
            counts[s[right]] = (counts[s[right]] || 0) + 1;
            maxFreq = Math.max(maxFreq, counts[s[right]]);
            while ((right - left + 1) - maxFreq > k) {
                counts[s[left]]--;
                left++;
            }
            result = Math.max(result, right - left + 1);
        }
        return result;
    }
  go: |
    func characterReplacement(s string, k int) int {
        counts := [26]int{}
        left := 0
        maxFreq := 0
        result := 0
        for right := 0; right < len(s); right++ {
            idx := s[right] - 'A'
            counts[idx]++
            if counts[idx] > maxFreq {
                maxFreq = counts[idx]
            }
            for (right-left+1)-maxFreq > k {
                counts[s[left]-'A']--
                left++
            }
            if right-left+1 > result {
                result = right - left + 1
            }
        }
        return result
    }
  java: |
    public int characterReplacement(String s, int k) {
        int[] counts = new int[26];
        int left = 0, maxFreq = 0, result = 0;
        for (int right = 0; right < s.length(); right++) {
            counts[s.charAt(right) - 'A']++;
            maxFreq = Math.max(maxFreq, counts[s.charAt(right) - 'A']);
            while ((right - left + 1) - maxFreq > k) {
                counts[s.charAt(left) - 'A']--;
                left++;
            }
            result = Math.max(result, right - left + 1);
        }
        return result;
    }
hints:
  - "The number of characters you need to replace in a window equals the window length minus the count of the most frequent character in that window."
  - "Use a sliding window. Expand the right side and track character frequencies. When the number of characters to replace exceeds k, shrink from the left. The answer is the largest valid window seen."
