test_cases:
  - input: { nums: [3, 4, 5, 1, 2] }
    expected: 1
  - input: { nums: [4, 5, 6, 7, 0, 1, 2] }
    expected: 0
  - input: { nums: [11, 13, 15, 17] }
    expected: 11
  - input: { nums: [2, 1] }
    expected: 1
  - input: { nums: [1] }
    expected: 1
  - input: { nums: [5, 1, 2, 3, 4] }
    expected: 1
solution:
  python: |
    def find_min(nums: list[int]) -> int:
        left, right = 0, len(nums) - 1
        while left < right:
            mid = (left + right) // 2
            if nums[mid] > nums[right]:
                left = mid + 1
            else:
                right = mid
        return nums[left]
  javascript: |
    function findMin(nums) {
        let left = 0, right = nums.length - 1;
        while (left < right) {
            const mid = Math.floor((left + right) / 2);
            if (nums[mid] > nums[right]) left = mid + 1;
            else right = mid;
        }
        return nums[left];
    }
  go: |
    func findMin(nums []int) int {
        left, right := 0, len(nums)-1
        for left < right {
            mid := (left + right) / 2
            if nums[mid] > nums[right] {
                left = mid + 1
            } else {
                right = mid
            }
        }
        return nums[left]
    }
  java: |
    public int findMin(int[] nums) {
        int left = 0, right = nums.length - 1;
        while (left < right) {
            int mid = left + (right - left) / 2;
            if (nums[mid] > nums[right]) left = mid + 1;
            else right = mid;
        }
        return nums[left];
    }
hints:
  - "The minimum is always at the rotation point — where the sorted order breaks."
  - "Compare the middle element with the rightmost element. If mid > right, the minimum is in the right half. Otherwise it is in the left half (including mid)."
