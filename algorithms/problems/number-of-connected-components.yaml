test_cases:
  - input: { n: 5, edges: [[0, 1], [1, 2], [3, 4]] }
    expected: 2
  - input: { n: 5, edges: [[0, 1], [1, 2], [2, 3], [3, 4]] }
    expected: 1
  - input: { n: 4, edges: [] }
    expected: 4
  - input: { n: 1, edges: [] }
    expected: 1
  - input: { n: 3, edges: [[0, 1], [0, 2]] }
    expected: 1
solution:
  python: |
    def count_components(n: int, edges: list[list[int]]) -> int:
        parent = list(range(n))
        rank = [0] * n

        def find(x):
            while parent[x] != x:
                parent[x] = parent[parent[x]]
                x = parent[x]
            return x

        def union(a, b):
            ra, rb = find(a), find(b)
            if ra == rb:
                return False
            if rank[ra] < rank[rb]:
                ra, rb = rb, ra
            parent[rb] = ra
            if rank[ra] == rank[rb]:
                rank[ra] += 1
            return True

        components = n
        for a, b in edges:
            if union(a, b):
                components -= 1
        return components
  javascript: |
    function countComponents(n, edges) {
      const parent = Array.from({ length: n }, (_, i) => i);
      const rank = new Array(n).fill(0);

      function find(x) {
        while (parent[x] !== x) {
          parent[x] = parent[parent[x]];
          x = parent[x];
        }
        return x;
      }

      function union(a, b) {
        let ra = find(a);
        let rb = find(b);
        if (ra === rb) return false;
        if (rank[ra] < rank[rb]) [ra, rb] = [rb, ra];
        parent[rb] = ra;
        if (rank[ra] === rank[rb]) rank[ra]++;
        return true;
      }

      let components = n;
      for (const [a, b] of edges) {
        if (union(a, b)) components--;
      }
      return components;
    }
  go: |
    package main

    func countComponents(n int, edges [][]int) int {
        parent := make([]int, n)
        rank := make([]int, n)
        for i := range parent {
            parent[i] = i
        }

        var find func(int) int
        find = func(x int) int {
            for parent[x] != x {
                parent[x] = parent[parent[x]]
                x = parent[x]
            }
            return x
        }

        union := func(a, b int) bool {
            ra, rb := find(a), find(b)
            if ra == rb {
                return false
            }
            if rank[ra] < rank[rb] {
                ra, rb = rb, ra
            }
            parent[rb] = ra
            if rank[ra] == rank[rb] {
                rank[ra]++
            }
            return true
        }

        components := n
        for _, e := range edges {
            if union(e[0], e[1]) {
                components--
            }
        }
        return components
    }
  java: |
    public int countComponents(int n, int[][] edges) {
        int[] parent = new int[n];
        int[] rank = new int[n];
        for (int i = 0; i < n; i++) parent[i] = i;

        int components = n;
        for (int[] e : edges) {
            if (union(parent, rank, e[0], e[1])) components--;
        }
        return components;
    }

    private int find(int[] parent, int x) {
        while (parent[x] != x) {
            parent[x] = parent[parent[x]];
            x = parent[x];
        }
        return x;
    }

    private boolean union(int[] parent, int[] rank, int a, int b) {
        int ra = find(parent, a);
        int rb = find(parent, b);
        if (ra == rb) return false;
        if (rank[ra] < rank[rb]) { int t = ra; ra = rb; rb = t; }
        parent[rb] = ra;
        if (rank[ra] == rank[rb]) rank[ra]++;
        return true;
    }
hints:
  - "Start with n components (each node is its own component). How does adding an edge change the count?"
  - "Use Union-Find (Disjoint Set Union). For each edge, union the two nodes. Each successful union (merging two different sets) reduces the component count by one."
  - "Path compression and union by rank keep the operations nearly O(1) per call."
