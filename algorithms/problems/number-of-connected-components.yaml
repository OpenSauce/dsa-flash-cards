title: Number of Connected Components
difficulty: medium
tags: [graph, union-find]
description: |
  You have `n` nodes labeled from `0` to `n - 1` and a list of
  undirected edges. Each edge `[a, b]` connects nodes `a` and `b`.

  Return the number of connected components in the graph. A connected
  component is a group of nodes where every node can be reached from
  every other node in that group through some path.
examples:
  - input: "n = 5, edges = [[0,1],[1,2],[3,4]]"
    output: "2"
    explanation: "Nodes 0-1-2 form one component and nodes 3-4 form another."
  - input: "n = 5, edges = [[0,1],[1,2],[2,3],[3,4]]"
    output: "1"
    explanation: "All nodes are connected in a single chain."
  - input: "n = 4, edges = []"
    output: "4"
    explanation: "With no edges, each node is its own component."
constraints:
  - "1 <= n <= 2000"
  - "0 <= edges.length <= 5000"
  - "edges[i].length == 2"
  - "0 <= a, b < n"
  - "a != b"
  - "No duplicate edges."
