title: Container With Most Water
difficulty: medium
tags: [two-pointers, array]
description: |
  You are given an array of positive integers `height` where each element
  represents the height of a vertical line drawn at that index. Find two
  lines that, together with the x-axis, form a container that holds the
  most water. Return the maximum amount of water the container can store.

  The container's width is the distance between the two chosen indices, and
  its height is the shorter of the two lines. You may not tilt the container.
examples:
  - input: "height = [1,8,6,2,5,4,8,3,7]"
    output: "49"
    explanation: "Lines at index 1 (height 8) and index 8 (height 7) form a container of width 7 and height 7, holding 49 units."
  - input: "height = [1,1]"
    output: "1"
    explanation: "The only possible container uses both lines, giving width 1 and height 1."
constraints:
  - "2 <= height.length <= 10^5"
  - "0 <= height[i] <= 10^4"
