test_cases:
  - input: { height: [1, 8, 6, 2, 5, 4, 8, 3, 7] }
    expected: 49
  - input: { height: [1, 1] }
    expected: 1
  - input: { height: [4, 3, 2, 1, 4] }
    expected: 16
  - input: { height: [1, 2, 1] }
    expected: 2
  - input: { height: [1, 0, 0, 0, 0, 0, 0, 2, 2] }
    expected: 8
solution:
  python: |
    def max_area(height: list[int]) -> int:
        left, right = 0, len(height) - 1
        best = 0
        while left < right:
            w = right - left
            h = min(height[left], height[right])
            best = max(best, w * h)
            if height[left] < height[right]:
                left += 1
            else:
                right -= 1
        return best
  javascript: |
    function maxArea(height) {
        let left = 0, right = height.length - 1;
        let best = 0;
        while (left < right) {
            const w = right - left;
            const h = Math.min(height[left], height[right]);
            best = Math.max(best, w * h);
            if (height[left] < height[right]) {
                left++;
            } else {
                right--;
            }
        }
        return best;
    }
  go: |
    func maxArea(height []int) int {
        left, right := 0, len(height)-1
        best := 0
        for left < right {
            w := right - left
            h := height[left]
            if height[right] < h {
                h = height[right]
            }
            area := w * h
            if area > best {
                best = area
            }
            if height[left] < height[right] {
                left++
            } else {
                right--
            }
        }
        return best
    }
  java: |
    public int maxArea(int[] height) {
        int left = 0, right = height.length - 1;
        int best = 0;
        while (left < right) {
            int w = right - left;
            int h = Math.min(height[left], height[right]);
            best = Math.max(best, w * h);
            if (height[left] < height[right]) {
                left++;
            } else {
                right--;
            }
        }
        return best;
    }
hints:
  - "Start with the widest possible container and try to find a taller one."
  - "Use two pointers at the ends of the array. Move the pointer pointing to the shorter line inward, since moving the taller one can only decrease the width without any guarantee of increasing height."
