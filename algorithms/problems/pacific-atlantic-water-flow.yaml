solution:
  python: |
    def pacific_atlantic(heights: list[list[int]]) -> list[list[int]]:
        if not heights:
            return []
        rows, cols = len(heights), len(heights[0])
        pacific = set()
        atlantic = set()

        def dfs(r, c, reachable, prev_height):
            if (r, c) in reachable or r < 0 or r >= rows or c < 0 or c >= cols:
                return
            if heights[r][c] < prev_height:
                return
            reachable.add((r, c))
            for dr, dc in [(1, 0), (-1, 0), (0, 1), (0, -1)]:
                dfs(r + dr, c + dc, reachable, heights[r][c])

        for c in range(cols):
            dfs(0, c, pacific, 0)
            dfs(rows - 1, c, atlantic, 0)
        for r in range(rows):
            dfs(r, 0, pacific, 0)
            dfs(r, cols - 1, atlantic, 0)

        result = sorted([r, c] for r, c in pacific & atlantic)
        return result
  javascript: |
    function pacificAtlantic(heights) {
      const rows = heights.length;
      const cols = heights[0].length;
      const pacific = new Set();
      const atlantic = new Set();

      function dfs(r, c, reachable, prevHeight) {
        const key = r + ',' + c;
        if (reachable.has(key) || r < 0 || r >= rows || c < 0 || c >= cols) return;
        if (heights[r][c] < prevHeight) return;
        reachable.add(key);
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        for (const [dr, dc] of dirs) {
          dfs(r + dr, c + dc, reachable, heights[r][c]);
        }
      }

      for (let c = 0; c < cols; c++) {
        dfs(0, c, pacific, 0);
        dfs(rows - 1, c, atlantic, 0);
      }
      for (let r = 0; r < rows; r++) {
        dfs(r, 0, pacific, 0);
        dfs(r, cols - 1, atlantic, 0);
      }

      const result = [];
      for (const key of pacific) {
        if (atlantic.has(key)) {
          const [r, c] = key.split(',').map(Number);
          result.push([r, c]);
        }
      }
      result.sort((a, b) => a[0] - b[0] || a[1] - b[1]);
      return result;
    }
  go: |
    package main

    func pacificAtlantic(heights [][]int) [][]int {
        if len(heights) == 0 {
            return [][]int{}
        }
        rows := len(heights)
        cols := len(heights[0])
        pacific := make([][]bool, rows)
        atlantic := make([][]bool, rows)
        for i := 0; i < rows; i++ {
            pacific[i] = make([]bool, cols)
            atlantic[i] = make([]bool, cols)
        }

        var dfs func(r, c int, reachable [][]bool, prevHeight int)
        dfs = func(r, c int, reachable [][]bool, prevHeight int) {
            if r < 0 || r >= rows || c < 0 || c >= cols || reachable[r][c] {
                return
            }
            if heights[r][c] < prevHeight {
                return
            }
            reachable[r][c] = true
            dirs := [][2]int{{1, 0}, {-1, 0}, {0, 1}, {0, -1}}
            for _, d := range dirs {
                dfs(r+d[0], c+d[1], reachable, heights[r][c])
            }
        }

        for c := 0; c < cols; c++ {
            dfs(0, c, pacific, 0)
            dfs(rows-1, c, atlantic, 0)
        }
        for r := 0; r < rows; r++ {
            dfs(r, 0, pacific, 0)
            dfs(r, cols-1, atlantic, 0)
        }

        result := [][]int{}
        for r := 0; r < rows; r++ {
            for c := 0; c < cols; c++ {
                if pacific[r][c] && atlantic[r][c] {
                    result = append(result, []int{r, c})
                }
            }
        }
        return result
    }
  java: |
    import java.util.*;

    public int[][] pacificAtlantic(int[][] heights) {
        int rows = heights.length;
        int cols = heights[0].length;
        boolean[][] pacific = new boolean[rows][cols];
        boolean[][] atlantic = new boolean[rows][cols];

        for (int c = 0; c < cols; c++) {
            dfs(heights, pacific, 0, c, 0, rows, cols);
            dfs(heights, atlantic, rows - 1, c, 0, rows, cols);
        }
        for (int r = 0; r < rows; r++) {
            dfs(heights, pacific, r, 0, 0, rows, cols);
            dfs(heights, atlantic, r, cols - 1, 0, rows, cols);
        }

        List<int[]> result = new ArrayList<>();
        for (int r = 0; r < rows; r++) {
            for (int c = 0; c < cols; c++) {
                if (pacific[r][c] && atlantic[r][c]) {
                    result.add(new int[]{r, c});
                }
            }
        }
        int[][] ans = new int[result.size()][2];
        for (int i = 0; i < result.size(); i++) ans[i] = result.get(i);
        return ans;
    }

    private void dfs(int[][] heights, boolean[][] reachable, int r, int c, int prevHeight, int rows, int cols) {
        if (r < 0 || r >= rows || c < 0 || c >= cols || reachable[r][c]) return;
        if (heights[r][c] < prevHeight) return;
        reachable[r][c] = true;
        int[][] dirs = {{1,0},{-1,0},{0,1},{0,-1}};
        for (int[] d : dirs) {
            dfs(heights, reachable, r + d[0], c + d[1], heights[r][c], rows, cols);
        }
    }
hints:
  - "Instead of checking from each cell whether water can reach both oceans, think about it in reverse: which cells can be reached from each ocean?"
  - "Start DFS/BFS from each ocean's border cells, flowing uphill (to cells with height >= current). Then find cells reachable from both oceans."
  - "Use two boolean grids to track reachability from each ocean. The answer is the intersection."
