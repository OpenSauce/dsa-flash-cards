title: Pacific Atlantic Water Flow
difficulty: medium
tags: [graph, bfs, dfs]
description: |
  You are given an `m x n` grid of non-negative integers representing
  the height of each cell on an island. The island borders two oceans:
  - The Pacific Ocean touches the top and left edges.
  - The Atlantic Ocean touches the bottom and right edges.

  Water can flow from a cell to an adjacent cell (up, down, left, right)
  if the adjacent cell's height is less than or equal to the current
  cell's height. Water can also flow into the ocean from border cells.

  Return a list of all cell coordinates `[r, c]` from which water can
  flow to both the Pacific and the Atlantic oceans. The result may be
  returned in any order.
examples:
  - input: |
      heights = [
        [1,2,2,3,5],
        [3,2,3,4,4],
        [2,4,5,3,1],
        [6,7,1,4,5],
        [5,1,1,2,4]
      ]
    output: "[[0,4],[1,3],[1,4],[2,2],[3,0],[3,1],[4,0]]"
    explanation: "These cells can reach both the top/left (Pacific) and bottom/right (Atlantic) edges via non-increasing paths."
  - input: "heights = [[1]]"
    output: "[[0,0]]"
    explanation: "A single cell borders both oceans."
constraints:
  - "1 <= m, n <= 200"
  - "0 <= heights[r][c] <= 10^5"
