test_cases:
  - input: { target: 7, nums: [2, 3, 1, 2, 4, 3] }
    expected: 2
  - input: { target: 11, nums: [1, 1, 1, 1, 1, 1, 1, 1] }
    expected: 0
  - input: { target: 4, nums: [1, 4, 4] }
    expected: 1
  - input: { target: 15, nums: [5, 1, 3, 5, 10, 7, 4, 9, 2, 8] }
    expected: 2
  - input: { target: 3, nums: [1, 1, 1, 1, 1] }
    expected: 3
solution:
  python: |
    def min_sub_array_len(target: int, nums: list[int]) -> int:
        left = 0
        total = 0
        result = len(nums) + 1
        for right in range(len(nums)):
            total += nums[right]
            while total >= target:
                result = min(result, right - left + 1)
                total -= nums[left]
                left += 1
        return result if result <= len(nums) else 0
  javascript: |
    function minSubArrayLen(target, nums) {
        let left = 0, total = 0, result = nums.length + 1;
        for (let right = 0; right < nums.length; right++) {
            total += nums[right];
            while (total >= target) {
                result = Math.min(result, right - left + 1);
                total -= nums[left];
                left++;
            }
        }
        return result <= nums.length ? result : 0;
    }
  go: |
    func minSubArrayLen(target int, nums []int) int {
        left := 0
        total := 0
        result := len(nums) + 1
        for right := 0; right < len(nums); right++ {
            total += nums[right]
            for total >= target {
                length := right - left + 1
                if length < result {
                    result = length
                }
                total -= nums[left]
                left++
            }
        }
        if result > len(nums) {
            return 0
        }
        return result
    }
  java: |
    public int minSubArrayLen(int target, int[] nums) {
        int left = 0, total = 0, result = nums.length + 1;
        for (int right = 0; right < nums.length; right++) {
            total += nums[right];
            while (total >= target) {
                result = Math.min(result, right - left + 1);
                total -= nums[left];
                left++;
            }
        }
        return result <= nums.length ? result : 0;
    }
hints:
  - "Since all numbers are positive, a longer subarray can only have a larger or equal sum. This means you can shrink the window from the left once the sum meets the target."
  - "Expand the window by moving the right pointer and adding to the running sum. Once the sum meets or exceeds the target, record the window length and shrink from the left. Track the minimum valid window."
