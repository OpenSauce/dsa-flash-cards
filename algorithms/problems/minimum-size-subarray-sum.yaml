title: Minimum Size Subarray Sum
difficulty: medium
tags: [sliding-window, array]
description: |
  Given an array of positive integers `nums` and a positive integer `target`,
  return the minimal length of a contiguous subarray whose sum is greater
  than or equal to `target`. If no such subarray exists, return 0.
examples:
  - input: "target = 7, nums = [2,3,1,2,4,3]"
    output: "2"
    explanation: "The subarray [4,3] has sum 7 and length 2, which is the shortest."
  - input: "target = 11, nums = [1,1,1,1,1,1,1,1]"
    output: "0"
    explanation: "No subarray sums to 11 or more."
constraints:
  - "1 <= target <= 10^9"
  - "1 <= nums.length <= 10^5"
  - "1 <= nums[i] <= 10^4"
