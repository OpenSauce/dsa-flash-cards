test_cases:
  - input: { nums: [4, 5, 6, 7, 0, 1, 2], target: 0 }
    expected: 4
  - input: { nums: [4, 5, 6, 7, 0, 1, 2], target: 3 }
    expected: -1
  - input: { nums: [1], target: 0 }
    expected: -1
  - input: { nums: [1], target: 1 }
    expected: 0
  - input: { nums: [3, 1], target: 1 }
    expected: 1
  - input: { nums: [5, 1, 3], target: 5 }
    expected: 0
solution:
  python: |
    def search(nums: list[int], target: int) -> int:
        left, right = 0, len(nums) - 1
        while left <= right:
            mid = (left + right) // 2
            if nums[mid] == target:
                return mid
            if nums[left] <= nums[mid]:
                if nums[left] <= target < nums[mid]:
                    right = mid - 1
                else:
                    left = mid + 1
            else:
                if nums[mid] < target <= nums[right]:
                    left = mid + 1
                else:
                    right = mid - 1
        return -1
  javascript: |
    function search(nums, target) {
        let left = 0, right = nums.length - 1;
        while (left <= right) {
            const mid = Math.floor((left + right) / 2);
            if (nums[mid] === target) return mid;
            if (nums[left] <= nums[mid]) {
                if (nums[left] <= target && target < nums[mid]) right = mid - 1;
                else left = mid + 1;
            } else {
                if (nums[mid] < target && target <= nums[right]) left = mid + 1;
                else right = mid - 1;
            }
        }
        return -1;
    }
  go: |
    func search(nums []int, target int) int {
        left, right := 0, len(nums)-1
        for left <= right {
            mid := (left + right) / 2
            if nums[mid] == target {
                return mid
            }
            if nums[left] <= nums[mid] {
                if nums[left] <= target && target < nums[mid] {
                    right = mid - 1
                } else {
                    left = mid + 1
                }
            } else {
                if nums[mid] < target && target <= nums[right] {
                    left = mid + 1
                } else {
                    right = mid - 1
                }
            }
        }
        return -1
    }
  java: |
    public int search(int[] nums, int target) {
        int left = 0, right = nums.length - 1;
        while (left <= right) {
            int mid = left + (right - left) / 2;
            if (nums[mid] == target) return mid;
            if (nums[left] <= nums[mid]) {
                if (nums[left] <= target && target < nums[mid]) right = mid - 1;
                else left = mid + 1;
            } else {
                if (nums[mid] < target && target <= nums[right]) left = mid + 1;
                else right = mid - 1;
            }
        }
        return -1;
    }
hints:
  - "At least one half of the array around the midpoint is always sorted. Determine which half is sorted, then check if the target lies in that range."
  - "If the left half is sorted (nums[left] <= nums[mid]), check if target falls in [left, mid). If so, search left; otherwise search right. Mirror the logic for the right half."
