title: Sliding Window Maximum
difficulty: hard
tags: [sliding-window, deque]
description: |
  You are given an array of integers `nums` and an integer `k` representing
  the size of a sliding window that moves from left to right across the
  array. At each position the window covers `k` consecutive elements.
  Return an array containing the maximum value in each window position.

  The window starts covering `nums[0..k-1]` and slides one element right
  each step until it covers `nums[n-k..n-1]`.
examples:
  - input: "nums = [1,3,-1,-3,5,3,6,7], k = 3"
    output: "[3,3,5,5,6,7]"
    explanation: "Window positions and their maxima: [1,3,-1]=3, [3,-1,-3]=3, [-1,-3,5]=5, [-3,5,3]=5, [5,3,6]=6, [3,6,7]=7."
  - input: "nums = [1], k = 1"
    output: "[1]"
    explanation: "Single element window returns that element."
constraints:
  - "1 <= nums.length <= 10^5"
  - "-10^4 <= nums[i] <= 10^4"
  - "1 <= k <= nums.length"
