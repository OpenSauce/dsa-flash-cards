title: Search a 2D Matrix
difficulty: medium
tags: [binary-search]
description: |
  You are given an `m x n` integer matrix with the following properties:
  each row is sorted in ascending order, and the first integer of each
  row is greater than the last integer of the previous row.

  Given an integer `target`, return `true` if the target is in the
  matrix, or `false` otherwise. Your solution must run in O(log(m*n))
  time.
examples:
  - input: "matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 3"
    output: "true"
    explanation: "The value 3 is in the first row at column 1."
  - input: "matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 13"
    output: "false"
    explanation: "The value 13 does not appear anywhere in the matrix."
constraints:
  - "m == matrix.length"
  - "n == matrix[i].length"
  - "1 <= m, n <= 100"
  - "-10^4 <= matrix[i][j], target <= 10^4"
starter_code:
  python: |
    def search_matrix(matrix: list[list[int]], target: int) -> bool:
        pass
  javascript: |
    function searchMatrix(matrix, target) {
    }
  go: |
    func searchMatrix(matrix [][]int, target int) bool {
    }
  java: |
    public boolean searchMatrix(int[][] matrix, int target) {
    }
test_cases:
  - input: { matrix: [[1, 3, 5, 7], [10, 11, 16, 20], [23, 30, 34, 60]], target: 3 }
    expected: true
  - input: { matrix: [[1, 3, 5, 7], [10, 11, 16, 20], [23, 30, 34, 60]], target: 13 }
    expected: false
  - input: { matrix: [[1]], target: 1 }
    expected: true
  - input: { matrix: [[1]], target: 0 }
    expected: false
  - input: { matrix: [[1, 3], [5, 7]], target: 5 }
    expected: true
  - input: { matrix: [[1, 3, 5]], target: 4 }
    expected: false
solution:
  python: |
    def search_matrix(matrix: list[list[int]], target: int) -> bool:
        m, n = len(matrix), len(matrix[0])
        left, right = 0, m * n - 1
        while left <= right:
            mid = (left + right) // 2
            val = matrix[mid // n][mid % n]
            if val == target:
                return True
            elif val < target:
                left = mid + 1
            else:
                right = mid - 1
        return False
  javascript: |
    function searchMatrix(matrix, target) {
        const m = matrix.length, n = matrix[0].length;
        let left = 0, right = m * n - 1;
        while (left <= right) {
            const mid = Math.floor((left + right) / 2);
            const val = matrix[Math.floor(mid / n)][mid % n];
            if (val === target) return true;
            else if (val < target) left = mid + 1;
            else right = mid - 1;
        }
        return false;
    }
  go: |
    func searchMatrix(matrix [][]int, target int) bool {
        m, n := len(matrix), len(matrix[0])
        left, right := 0, m*n-1
        for left <= right {
            mid := (left + right) / 2
            val := matrix[mid/n][mid%n]
            if val == target {
                return true
            } else if val < target {
                left = mid + 1
            } else {
                right = mid - 1
            }
        }
        return false
    }
  java: |
    public boolean searchMatrix(int[][] matrix, int target) {
        int m = matrix.length, n = matrix[0].length;
        int left = 0, right = m * n - 1;
        while (left <= right) {
            int mid = left + (right - left) / 2;
            int val = matrix[mid / n][mid % n];
            if (val == target) return true;
            else if (val < target) left = mid + 1;
            else right = mid - 1;
        }
        return false;
    }
hints:
  - "Treat the entire matrix as a single sorted array. How can you convert a 1D index to a 2D row/column?"
  - "Use binary search on indices 0 to m*n-1. Convert index to (row, col) via row = index / n, col = index % n."
