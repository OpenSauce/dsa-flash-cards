title: Trapping Rain Water
difficulty: hard
tags: [two-pointers, array]
description: |
  Given an array of non-negative integers `height` representing an elevation
  map where each bar has width 1, compute how much water can be trapped
  between the bars after it rains.

  Water at any position is bounded by the tallest bar to its left and the
  tallest bar to its right. The amount of water above a bar equals the
  minimum of those two tallest bars minus the bar's own height (if positive).
examples:
  - input: "height = [0,1,0,2,1,0,1,3,2,1,2,1]"
    output: "6"
    explanation: "Water fills the valleys: 1 unit above index 2, 1 above index 4, 2 above index 5, 1 above index 6, and 1 above index 9."
  - input: "height = [4,2,0,3,2,5]"
    output: "9"
    explanation: "Water fills in gaps between the tall bars at each end."
constraints:
  - "1 <= height.length <= 2 * 10^4"
  - "0 <= height[i] <= 10^5"
starter_code:
  python: |
    def trap(height: list[int]) -> int:
        pass
  javascript: |
    function trap(height) {
    }
  go: |
