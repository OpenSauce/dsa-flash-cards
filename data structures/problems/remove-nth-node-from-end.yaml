title: Remove Nth Node From End
difficulty: medium
tags: [linked-list, two-pointers]
description: |
  Given the head of a singly linked list, remove the nth node from the end
  of the list and return the updated head.

  The list is guaranteed to have at least n nodes.
examples:
  - input: "head = [1,2,3,4,5], n = 2"
    output: "[1,2,3,5]"
    explanation: "The 2nd node from the end is 4, which is removed."
  - input: "head = [1], n = 1"
    output: "[]"
    explanation: "Removing the only node results in an empty list."
constraints:
  - "1 <= number of nodes <= 30"
  - "0 <= Node.val <= 100"
  - "1 <= n <= number of nodes"
