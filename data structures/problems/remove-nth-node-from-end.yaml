solution:
  python: |
    from typing import Optional

    class ListNode:
        def __init__(self, val=0, next=None):
            self.val = val
            self.next = next

    def remove_nth_from_end(head: Optional[ListNode], n: int) -> Optional[ListNode]:
        dummy = ListNode(0, head)
        fast = dummy
        slow = dummy
        for _ in range(n + 1):
            fast = fast.next
        while fast:
            fast = fast.next
            slow = slow.next
        slow.next = slow.next.next
        return dummy.next
  javascript: |
    class ListNode {
        constructor(val = 0, next = null) {
            this.val = val;
            this.next = next;
        }
    }

    function removeNthFromEnd(head, n) {
        const dummy = new ListNode(0, head);
        let fast = dummy, slow = dummy;
        for (let i = 0; i <= n; i++) fast = fast.next;
        while (fast !== null) {
            fast = fast.next;
            slow = slow.next;
        }
        slow.next = slow.next.next;
        return dummy.next;
    }
  go: |
    type ListNode struct {
        Val  int
        Next *ListNode
    }

    func removeNthFromEnd(head *ListNode, n int) *ListNode {
        dummy := &ListNode{0, head}
        fast := dummy
        slow := dummy
        for i := 0; i <= n; i++ {
            fast = fast.Next
        }
        for fast != nil {
            fast = fast.Next
            slow = slow.Next
        }
        slow.Next = slow.Next.Next
        return dummy.Next
    }
  java: |
    class ListNode {
        int val;
        ListNode next;
        ListNode(int x) { val = x; }
    }

    public ListNode removeNthFromEnd(ListNode head, int n) {
        ListNode dummy = new ListNode(0);
        dummy.next = head;
        ListNode fast = dummy, slow = dummy;
        for (int i = 0; i <= n; i++) fast = fast.next;
        while (fast != null) {
            fast = fast.next;
            slow = slow.next;
        }
        slow.next = slow.next.next;
        return dummy.next;
    }
hints:
  - "If you knew the total length, removing the nth from end is straightforward. Can you find the target node in a single pass?"
  - "Use two pointers separated by exactly n nodes. Advance both until the lead pointer reaches the end — the trailing pointer is now just before the node to remove. A dummy head simplifies edge cases where the head itself is removed."
