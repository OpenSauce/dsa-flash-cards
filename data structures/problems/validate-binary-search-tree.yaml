title: Validate Binary Search Tree
difficulty: medium
tags: [tree, dfs]
description: |
  Given the root of a binary tree, determine whether it is a valid
  binary search tree (BST).

  A valid BST satisfies these rules for every node:
  - All values in its left subtree are strictly less than the node's value.
  - All values in its right subtree are strictly greater than the node's value.
  - Both left and right subtrees must also be valid BSTs.
examples:
  - input: "root = [2,1,3]"
    output: "true"
    explanation: "1 < 2 < 3, so the BST property holds."
  - input: "root = [5,1,4,null,null,3,6]"
    output: "false"
    explanation: "The right child 4 is less than the root 5, violating the BST rule."
  - input: "root = [5,4,6,null,null,3,7]"
    output: "false"
    explanation: "Node 3 is in the right subtree of 5 but is less than 5."
constraints:
  - "1 <= number of nodes <= 10^4"
  - "-2^31 <= Node.val <= 2^31 - 1"
