title: Subtree of Another Tree
difficulty: easy
tags: [tree, dfs]
description: |
  Given the roots of two binary trees `root` and `sub_root`, determine
  whether `sub_root` is a subtree of `root`.

  A subtree of a binary tree is a tree that consists of a node in `root`
  and all of that node's descendants. The tree `root` is also considered
  a subtree of itself.
examples:
  - input: "root = [3,4,5,1,2], sub_root = [4,1,2]"
    output: "true"
    explanation: "The left subtree rooted at 4 matches sub_root exactly."
  - input: "root = [3,4,5,1,2,null,null,null,null,0], sub_root = [4,1,2]"
    output: "false"
    explanation: "The node 2 in root has a left child 0, but in sub_root it does not."
  - input: "root = [1,1], sub_root = [1]"
    output: "true"
    explanation: "The left child of root is a single node 1, which matches sub_root."
constraints:
  - "1 <= number of nodes in root <= 2000"
  - "1 <= number of nodes in sub_root <= 1000"
  - "-10^4 <= Node.val <= 10^4"
