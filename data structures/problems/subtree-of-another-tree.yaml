    func isSubtree(root *TreeNode, subRoot *TreeNode) bool {
        if root == nil {
            return false
        }
        if isSameTree(root, subRoot) {
            return true
        }
        return isSubtree(root.Left, subRoot) || isSubtree(root.Right, subRoot)
    }

    func isSameTree(p *TreeNode, q *TreeNode) bool {
        if p == nil && q == nil {
            return true
        }
        if p == nil || q == nil {
            return false
        }
        return p.Val == q.Val && isSameTree(p.Left, q.Left) && isSameTree(p.Right, q.Right)
    }
  java: |
    class TreeNode {
        int val;
        TreeNode left;
        TreeNode right;
        TreeNode(int val) { this.val = val; }
    }

    public boolean isSubtree(TreeNode root, TreeNode subRoot) {
        if (root == null) return false;
        if (isSame(root, subRoot)) return true;
        return isSubtree(root.left, subRoot) || isSubtree(root.right, subRoot);
    }

    private boolean isSame(TreeNode p, TreeNode q) {
        if (p == null && q == null) return true;
        if (p == null || q == null) return false;
        return p.val == q.val && isSame(p.left, q.left) && isSame(p.right, q.right);
    }
hints:
  - "At each node in root, you can check whether the subtree starting there matches sub_root entirely."
  - "Write a helper that checks if two trees are identical, then traverse root and call it at every node."
  - "The base case for the traversal: if root is null, sub_root cannot be found."
