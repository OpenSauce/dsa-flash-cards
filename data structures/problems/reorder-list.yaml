solution:
  python: |
    from typing import Optional

    class ListNode:
        def __init__(self, val=0, next=None):
            self.val = val
            self.next = next

    def reorder_list(head: Optional[ListNode]) -> Optional[ListNode]:
        if not head or not head.next:
            return head
        slow, fast = head, head
        while fast.next and fast.next.next:
            slow = slow.next
            fast = fast.next.next
        second = slow.next
        slow.next = None
        prev = None
        while second:
            nxt = second.next
            second.next = prev
            prev = second
            second = nxt
        first, second = head, prev
        while second:
            tmp1, tmp2 = first.next, second.next
            first.next = second
            second.next = tmp1
            first = tmp1
            second = tmp2
        return head
  javascript: |
    class ListNode {
        constructor(val = 0, next = null) {
            this.val = val;
            this.next = next;
        }
    }

    function reorderList(head) {
        if (!head || !head.next) return head;
        let slow = head, fast = head;
        while (fast.next && fast.next.next) {
            slow = slow.next;
            fast = fast.next.next;
        }
        let second = slow.next;
        slow.next = null;
        let prev = null;
        while (second) {
            const nxt = second.next;
            second.next = prev;
            prev = second;
            second = nxt;
        }
        let first = head;
        second = prev;
        while (second) {
            const tmp1 = first.next, tmp2 = second.next;
            first.next = second;
            second.next = tmp1;
            first = tmp1;
            second = tmp2;
        }
        return head;
    }
  go: |
    type ListNode struct {
        Val  int
        Next *ListNode
    }

    func reorderList(head *ListNode) *ListNode {
        if head == nil || head.Next == nil {
            return head
        }
        slow, fast := head, head
        for fast.Next != nil && fast.Next.Next != nil {
            slow = slow.Next
            fast = fast.Next.Next
        }
        second := slow.Next
        slow.Next = nil
        var prev *ListNode
        for second != nil {
            nxt := second.Next
            second.Next = prev
            prev = second
            second = nxt
        }
        first := head
        second = prev
        for second != nil {
            tmp1, tmp2 := first.Next, second.Next
            first.Next = second
            second.Next = tmp1
            first = tmp1
            second = tmp2
        }
        return head
    }
  java: |
    class ListNode {
        int val;
        ListNode next;
        ListNode(int x) { val = x; }
    }

    public ListNode reorderList(ListNode head) {
        if (head == null || head.next == null) return head;
        ListNode slow = head, fast = head;
        while (fast.next != null && fast.next.next != null) {
            slow = slow.next;
            fast = fast.next.next;
        }
        ListNode second = slow.next;
        slow.next = null;
        ListNode prev = null;
        while (second != null) {
            ListNode nxt = second.next;
            second.next = prev;
            prev = second;
            second = nxt;
        }
        ListNode first = head;
        second = prev;
        while (second != null) {
            ListNode tmp1 = first.next, tmp2 = second.next;
            first.next = second;
            second.next = tmp1;
            first = tmp1;
            second = tmp2;
        }
        return head;
    }
hints:
  - "Split the problem into three steps: find the middle, reverse the second half, and merge the two halves."
  - "Use slow/fast pointers to find the midpoint. Reverse the second half of the list. Then interleave nodes from the first half and the reversed second half."
