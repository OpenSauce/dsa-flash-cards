title: Reorder List
difficulty: medium
tags: [linked-list]
description: |
  Given the head of a singly linked list
  `L0 -> L1 -> ... -> Ln-1 -> Ln`, reorder it in-place to:
  `L0 -> Ln -> L1 -> Ln-1 -> L2 -> Ln-2 -> ...`

  You must not modify the values in the nodes — only the node links
  themselves may be changed. Return the head of the reordered list.
examples:
  - input: "head = [1,2,3,4]"
    output: "[1,4,2,3]"
    explanation: "The list is reordered by interleaving from the front and back."
  - input: "head = [1,2,3,4,5]"
    output: "[1,5,2,4,3]"
    explanation: "The middle element stays in place for odd-length lists."
constraints:
  - "1 <= number of nodes <= 5 * 10^4"
  - "1 <= Node.val <= 1000"
