test_cases:
  - input: { head: [3, 2, 0, -4], pos: 1 }
    expected: true
  - input: { head: [1, 2], pos: 0 }
    expected: true
  - input: { head: [1], pos: -1 }
    expected: false
  - input: { head: [], pos: -1 }
    expected: false
  - input: { head: [1, 2, 3, 4, 5], pos: -1 }
    expected: false
solution:
  python: |
    from typing import Optional

    class ListNode:
        def __init__(self, val=0, next=None):
            self.val = val
            self.next = next

    def has_cycle(head: Optional[ListNode]) -> bool:
        slow = head
        fast = head
        while fast and fast.next:
            slow = slow.next
            fast = fast.next.next
            if slow is fast:
                return True
        return False
  javascript: |
    class ListNode {
        constructor(val = 0, next = null) {
            this.val = val;
            this.next = next;
        }
    }

    function hasCycle(head) {
        let slow = head, fast = head;
        while (fast !== null && fast.next !== null) {
            slow = slow.next;
            fast = fast.next.next;
            if (slow === fast) return true;
        }
        return false;
    }
  go: |
    type ListNode struct {
        Val  int
        Next *ListNode
    }

    func hasCycle(head *ListNode) bool {
        slow := head
        fast := head
        for fast != nil && fast.Next != nil {
            slow = slow.Next
            fast = fast.Next.Next
            if slow == fast {
                return true
            }
        }
        return false
    }
  java: |
    class ListNode {
        int val;
        ListNode next;
        ListNode(int x) { val = x; }
    }

    public boolean hasCycle(ListNode head) {
        ListNode slow = head, fast = head;
        while (fast != null && fast.next != null) {
            slow = slow.next;
            fast = fast.next.next;
            if (slow == fast) return true;
        }
        return false;
    }
hints:
  - "If there is a cycle, a pointer moving at double speed will eventually lap a slower pointer."
  - "Use Floyd's tortoise and hare algorithm: move one pointer one step at a time and another two steps. If they ever meet, there is a cycle. If the fast pointer reaches the end, there is no cycle."
