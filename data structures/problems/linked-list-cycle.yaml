title: Linked List Cycle
difficulty: easy
tags: [linked-list]
description: |
  Given the `head` of a singly linked list, determine if the list contains
  a cycle. A cycle exists if some node in the list can be reached again by
  continuously following the `next` pointer.

  Return `true` if there is a cycle, or `false` otherwise.
examples:
  - input: "head = [3,2,0,-4], pos = 1"
    output: "true"
    explanation: "The tail connects back to the node at index 1, forming a cycle."
  - input: "head = [1], pos = -1"
    output: "false"
    explanation: "There is no cycle in a single-node list with no back-pointer."
constraints:
  - "0 <= number of nodes <= 10^4"
  - "-10^5 <= Node.val <= 10^5"
