title: Add Two Numbers
difficulty: medium
tags: [linked-list]
description: |
  You are given two non-empty linked lists representing two non-negative
  integers. The digits are stored in reverse order, and each node contains
  a single digit. Add the two numbers and return the sum as a linked list
  in the same reversed digit order.

  Neither number has leading zeros, except the number 0 itself.
examples:
  - input: "l1 = [2,4,3], l2 = [5,6,4]"
    output: "[7,0,8]"
    explanation: "342 + 465 = 807, stored in reverse as [7,0,8]."
  - input: "l1 = [0], l2 = [0]"
    output: "[0]"
    explanation: "0 + 0 = 0."
  - input: "l1 = [9,9,9], l2 = [1]"
    output: "[0,0,0,1]"
    explanation: "999 + 1 = 1000, stored in reverse as [0,0,0,1]."
constraints:
  - "1 <= number of nodes in each list <= 100"
  - "0 <= Node.val <= 9"
  - "The numbers do not have leading zeros (except 0 itself)."
