solution:
  python: |
    from typing import Optional

    class ListNode:
        def __init__(self, val=0, next=None):
            self.val = val
            self.next = next

    def add_two_numbers(l1: Optional[ListNode], l2: Optional[ListNode]) -> Optional[ListNode]:
        dummy = ListNode(0)
        current = dummy
        carry = 0
        while l1 or l2 or carry:
            total = carry
            if l1:
                total += l1.val
                l1 = l1.next
            if l2:
                total += l2.val
                l2 = l2.next
            carry, digit = divmod(total, 10)
            current.next = ListNode(digit)
            current = current.next
        return dummy.next
  javascript: |
    class ListNode {
        constructor(val = 0, next = null) {
            this.val = val;
            this.next = next;
        }
    }

    function addTwoNumbers(l1, l2) {
        const dummy = new ListNode(0);
        let current = dummy;
        let carry = 0;
        while (l1 || l2 || carry) {
            let total = carry;
            if (l1) { total += l1.val; l1 = l1.next; }
            if (l2) { total += l2.val; l2 = l2.next; }
            carry = Math.floor(total / 10);
            current.next = new ListNode(total % 10);
            current = current.next;
        }
        return dummy.next;
    }
  go: |
    type ListNode struct {
        Val  int
        Next *ListNode
    }

    func addTwoNumbers(l1 *ListNode, l2 *ListNode) *ListNode {
        dummy := &ListNode{}
        current := dummy
        carry := 0
        for l1 != nil || l2 != nil || carry != 0 {
            total := carry
            if l1 != nil {
                total += l1.Val
                l1 = l1.Next
            }
            if l2 != nil {
                total += l2.Val
                l2 = l2.Next
            }
            carry = total / 10
            current.Next = &ListNode{Val: total % 10}
            current = current.Next
        }
        return dummy.Next
    }
  java: |
    class ListNode {
        int val;
        ListNode next;
        ListNode(int x) { val = x; }
    }

    public ListNode addTwoNumbers(ListNode l1, ListNode l2) {
        ListNode dummy = new ListNode(0);
        ListNode current = dummy;
        int carry = 0;
        while (l1 != null || l2 != null || carry != 0) {
            int total = carry;
            if (l1 != null) { total += l1.val; l1 = l1.next; }
            if (l2 != null) { total += l2.val; l2 = l2.next; }
            carry = total / 10;
            current.next = new ListNode(total % 10);
            current = current.next;
        }
        return dummy.next;
    }
hints:
  - "Since digits are in reverse order, you can add them left to right just like elementary addition."
  - "Walk both lists simultaneously, adding corresponding digits plus any carry from the previous step. Create a new node for each digit of the result. Don't forget to handle a final carry."
