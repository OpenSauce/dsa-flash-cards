title: Same Tree
difficulty: easy
tags: [tree, dfs]
description: |
  Given the roots of two binary trees `p` and `q`, determine whether
  the two trees are structurally identical and have the same node values.

  Two trees are considered the same if they share the exact same shape
  and every corresponding node holds the same value.
examples:
  - input: "p = [1,2,3], q = [1,2,3]"
    output: "true"
    explanation: "Both trees have the same structure and values."
  - input: "p = [1,2], q = [1,null,2]"
    output: "false"
    explanation: "The left child of p is 2, but the left child of q is null."
  - input: "p = [1,2,1], q = [1,1,2]"
    output: "false"
    explanation: "The values at the second level are swapped."
constraints:
  - "0 <= number of nodes <= 100"
  - "-10^4 <= Node.val <= 10^4"
