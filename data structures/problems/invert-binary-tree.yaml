solution:
  python: |
    from typing import Optional

    class TreeNode:
        def __init__(self, val=0, left=None, right=None):
            self.val = val
            self.left = left
            self.right = right

    def invert_tree(root: Optional[TreeNode]) -> Optional[TreeNode]:
        if root is None:
            return None
        root.left, root.right = root.right, root.left
        invert_tree(root.left)
        invert_tree(root.right)
        return root
  javascript: |
    class TreeNode {
        constructor(val = 0, left = null, right = null) {
            this.val = val;
            this.left = left;
            this.right = right;
        }
    }

    function invertTree(root) {
        if (root === null) return null;
        const temp = root.left;
        root.left = root.right;
        root.right = temp;
        invertTree(root.left);
        invertTree(root.right);
        return root;
    }
  go: |
    type TreeNode struct {
        Val   int
        Left  *TreeNode
        Right *TreeNode
    }

    func invertTree(root *TreeNode) *TreeNode {
        if root == nil {
            return nil
        }
        root.Left, root.Right = root.Right, root.Left
        invertTree(root.Left)
        invertTree(root.Right)
        return root
    }
  java: |
    public TreeNode invertTree(TreeNode root) {
        if (root == null) return null;
        TreeNode temp = root.left;
        root.left = root.right;
        root.right = temp;
        invertTree(root.left);
        invertTree(root.right);
        return root;
    }
hints:
  - "What is the simplest operation you can do at a single node to start mirroring the tree?"
  - "Swap the left and right children of the current node, then recursively invert each subtree."
  - "The base case is a None node — there is nothing to swap."
