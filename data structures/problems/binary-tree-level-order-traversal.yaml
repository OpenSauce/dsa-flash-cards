solution:
  python: |
    from typing import Optional
    from collections import deque

    class TreeNode:
        def __init__(self, val=0, left=None, right=None):
            self.val = val
            self.left = left
            self.right = right

    def level_order(root: Optional[TreeNode]) -> list[list[int]]:
        if root is None:
            return []
        result = []
        queue = deque([root])
        while queue:
            level = []
            for _ in range(len(queue)):
                node = queue.popleft()
                level.append(node.val)
                if node.left:
                    queue.append(node.left)
                if node.right:
                    queue.append(node.right)
            result.append(level)
        return result
  javascript: |
    class TreeNode {
      constructor(val = 0, left = null, right = null) {
        this.val = val;
        this.left = left;
        this.right = right;
      }
    }

    function levelOrder(root) {
      if (root === null) return [];
      const result = [];
      const queue = [root];
      while (queue.length > 0) {
        const level = [];
        const size = queue.length;
        for (let i = 0; i < size; i++) {
          const node = queue.shift();
          level.push(node.val);
          if (node.left) queue.push(node.left);
          if (node.right) queue.push(node.right);
        }
        result.push(level);
      }
      return result;
    }
  go: |
    package main

    type TreeNode struct {
        Val   int
        Left  *TreeNode
        Right *TreeNode
    }

    func levelOrder(root *TreeNode) [][]int {
        if root == nil {
            return [][]int{}
        }
        result := [][]int{}
        queue := []*TreeNode{root}
        for len(queue) > 0 {
            size := len(queue)
            level := []int{}
            for i := 0; i < size; i++ {
                node := queue[0]
                queue = queue[1:]
                level = append(level, node.Val)
                if node.Left != nil {
                    queue = append(queue, node.Left)
                }
                if node.Right != nil {
                    queue = append(queue, node.Right)
                }
            }
            result = append(result, level)
        }
        return result
    }
  java: |
    import java.util.*;

    class TreeNode {
        int val;
        TreeNode left;
        TreeNode right;
        TreeNode(int val) { this.val = val; }
    }

    public List<List<Integer>> levelOrder(TreeNode root) {
        List<List<Integer>> result = new ArrayList<>();
        if (root == null) return result;
        Queue<TreeNode> queue = new LinkedList<>();
        queue.add(root);
        while (!queue.isEmpty()) {
            int size = queue.size();
            List<Integer> level = new ArrayList<>();
            for (int i = 0; i < size; i++) {
                TreeNode node = queue.poll();
                level.add(node.val);
                if (node.left != null) queue.add(node.left);
                if (node.right != null) queue.add(node.right);
            }
            result.add(level);
        }
        return result;
    }
hints:
  - "Think about processing the tree one layer at a time. Which data structure lets you visit nodes in the order they were discovered?"
  - "Use a queue (BFS). At each step, process all nodes currently in the queue (that is one level), and enqueue their children for the next level."
