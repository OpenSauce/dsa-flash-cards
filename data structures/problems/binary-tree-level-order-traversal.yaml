title: Binary Tree Level Order Traversal
difficulty: medium
tags: [tree, bfs]
description: |
  Given the root of a binary tree, return a list of lists containing
  the node values at each level, from left to right, top to bottom.

  Level 0 is the root, level 1 is the root's children, and so on.
  An empty tree should return an empty list.
examples:
  - input: "root = [3,9,20,null,null,15,7]"
    output: "[[3],[9,20],[15,7]]"
    explanation: "Level 0 has 3, level 1 has 9 and 20, level 2 has 15 and 7."
  - input: "root = [1]"
    output: "[[1]]"
    explanation: "A single node produces one level."
  - input: "root = []"
    output: "[]"
    explanation: "An empty tree has no levels."
constraints:
  - "0 <= number of nodes <= 2000"
  - "-1000 <= Node.val <= 1000"
