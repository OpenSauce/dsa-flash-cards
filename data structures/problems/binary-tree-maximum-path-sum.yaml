title: Binary Tree Maximum Path Sum
difficulty: hard
tags: [tree, dfs]
description: |
  A path in a binary tree is a sequence of nodes where each pair of
  adjacent nodes has an edge connecting them. A node can appear in the
  path at most once. The path does not need to pass through the root.

  Given the root of a binary tree, return the maximum sum of any path
  in the tree. The path must contain at least one node.
examples:
  - input: "root = [1,2,3]"
    output: "6"
    explanation: "The path 2 → 1 → 3 has the maximum sum 2 + 1 + 3 = 6."
  - input: "root = [-10,9,20,null,null,15,7]"
    output: "42"
    explanation: "The path 15 → 20 → 7 has sum 42, which is the maximum."
  - input: "root = [-3]"
    output: "-3"
    explanation: "The only path is the single node -3."
constraints:
  - "1 <= number of nodes <= 3 * 10^4"
  - "-1000 <= Node.val <= 1000"
