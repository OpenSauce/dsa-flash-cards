solution:
  python: |
    from typing import Optional

    class TreeNode:
        def __init__(self, val=0, left=None, right=None):
            self.val = val
            self.left = left
            self.right = right

    def max_path_sum(root: Optional[TreeNode]) -> int:
        best = float('-inf')
        def dfs(node):
            nonlocal best
            if node is None:
                return 0
            left = max(dfs(node.left), 0)
            right = max(dfs(node.right), 0)
            best = max(best, node.val + left + right)
            return node.val + max(left, right)
        dfs(root)
        return best
  javascript: |
    class TreeNode {
      constructor(val = 0, left = null, right = null) {
        this.val = val;
        this.left = left;
        this.right = right;
      }
    }

    function maxPathSum(root) {
      let best = -Infinity;
      function dfs(node) {
        if (node === null) return 0;
        const left = Math.max(dfs(node.left), 0);
        const right = Math.max(dfs(node.right), 0);
        best = Math.max(best, node.val + left + right);
        return node.val + Math.max(left, right);
      }
      dfs(root);
      return best;
    }
  go: |
    package main

    import "math"

    type TreeNode struct {
        Val   int
        Left  *TreeNode
        Right *TreeNode
    }

    func maxPathSum(root *TreeNode) int {
        best := math.MinInt64
        var dfs func(node *TreeNode) int
        dfs = func(node *TreeNode) int {
            if node == nil {
                return 0
            }
            left := dfs(node.Left)
            if left < 0 {
                left = 0
            }
            right := dfs(node.Right)
            if right < 0 {
                right = 0
            }
            sum := node.Val + left + right
            if sum > best {
                best = sum
            }
            if left > right {
                return node.Val + left
            }
            return node.Val + right
        }
        dfs(root)
        return best
    }
  java: |
    class TreeNode {
        int val;
        TreeNode left;
        TreeNode right;
        TreeNode(int val) { this.val = val; }
    }

    int best = Integer.MIN_VALUE;

    public int maxPathSum(TreeNode root) {
        best = Integer.MIN_VALUE;
        dfs(root);
        return best;
    }

    private int dfs(TreeNode node) {
        if (node == null) return 0;
        int left = Math.max(dfs(node.left), 0);
        int right = Math.max(dfs(node.right), 0);
        best = Math.max(best, node.val + left + right);
        return node.val + Math.max(left, right);
    }
hints:
  - "At each node, consider whether it is better to include the left subtree path, the right subtree path, both, or neither."
  - "Use DFS. At each node, compute the best single-branch gain (node + max of left or right, but at least 0). Update a global maximum considering the path that goes through both branches."
  - "The key insight: the path through a node can use both children, but when returning to the parent you can only continue along one branch."
