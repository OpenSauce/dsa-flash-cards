test_cases:
  - input: { strs: ["eat", "tea", "tan", "ate", "nat", "bat"] }
    expected: [["ate", "eat", "tea"], ["bat"], ["nat", "tan"]]
  - input: { strs: [""] }
    expected: [[""]]
  - input: { strs: ["a"] }
    expected: [["a"]]
  - input: { strs: ["abc", "bca", "cab", "xyz", "zyx"] }
    expected: [["abc", "bca", "cab"], ["xyz", "zyx"]]
  - input: { strs: ["a", "b", "c"] }
    expected: [["a"], ["b"], ["c"]]
solution:
  python: |
    def group_anagrams(strs: list[str]) -> list[list[str]]:
        groups = {}
        for s in strs:
            key = ''.join(sorted(s))
            if key not in groups:
                groups[key] = []
            groups[key].append(s)
        return sorted([sorted(g) for g in groups.values()])
  javascript: |
    function groupAnagrams(strs) {
        const groups = {};
        for (const s of strs) {
            const key = s.split('').sort().join('');
            if (!(key in groups)) groups[key] = [];
            groups[key].push(s);
        }
        return Object.values(groups).map(g => g.sort()).sort((a, b) => a[0].localeCompare(b[0]));
    }
  go: |
    func sortBytes(b []byte) {
        for i := 1; i < len(b); i++ {
            key := b[i]
            j := i - 1
            for j >= 0 && b[j] > key {
                b[j+1] = b[j]
                j--
            }
            b[j+1] = key
        }
    }

    func sortStrings(s []string) {
        for i := 1; i < len(s); i++ {
            key := s[i]
            j := i - 1
            for j >= 0 && s[j] > key {
                s[j+1] = s[j]
                j--
            }
            s[j+1] = key
        }
    }

    func groupAnagrams(strs []string) [][]string {
        groups := map[string][]string{}
        for _, s := range strs {
            b := []byte(s)
            sortBytes(b)
            key := string(b)
            groups[key] = append(groups[key], s)
        }
        result := [][]string{}
        for _, g := range groups {
            sortStrings(g)
            result = append(result, g)
        }
        for i := 1; i < len(result); i++ {
            key := result[i]
            j := i - 1
            for j >= 0 && result[j][0] > key[0] {
                result[j+1] = result[j]
                j--
            }
            result[j+1] = key
        }
        return result
    }
  java: |
    public List<List<String>> groupAnagrams(String[] strs) {
        Map<String, List<String>> groups = new HashMap<>();
        for (String s : strs) {
            char[] chars = s.toCharArray();
            Arrays.sort(chars);
            String key = new String(chars);
            groups.computeIfAbsent(key, k -> new ArrayList<>()).add(s);
        }
        List<List<String>> result = new ArrayList<>();
        for (List<String> g : groups.values()) {
            Collections.sort(g);
            result.add(g);
        }
        result.sort((a, b) -> a.get(0).compareTo(b.get(0)));
        return result;
    }
hints:
  - "What property do all anagrams share? Think about what happens when you sort the characters."
  - "Use the sorted version of each string as a hash map key. All anagrams will map to the same key."
