title: Lowest Common Ancestor of BST
difficulty: medium
tags: [tree, bst]
description: |
  Given a binary search tree (BST) and two nodes `p` and `q` that exist
  in the tree, find their lowest common ancestor (LCA).

  The lowest common ancestor of two nodes is the deepest node that has
  both `p` and `q` as descendants (a node is allowed to be a descendant
  of itself). Because this is a BST, you can use the ordering property
  to guide your search without visiting every node.
examples:
  - input: "root = [6,2,8,0,4,7,9,null,null,3,5], p = 2, q = 8"
    output: "6"
    explanation: "Node 2 is in the left subtree and node 8 is in the right subtree of 6, so 6 is the LCA."
  - input: "root = [6,2,8,0,4,7,9,null,null,3,5], p = 2, q = 4"
    output: "2"
    explanation: "Node 4 is a descendant of node 2, so node 2 is the LCA."
  - input: "root = [2,1], p = 2, q = 1"
    output: "2"
    explanation: "The root is an ancestor of every node, including itself."
constraints:
  - "2 <= number of nodes <= 10^5"
  - "-10^9 <= Node.val <= 10^9"
  - "All node values are unique."
  - "p != q"
  - "Both p and q exist in the tree."
