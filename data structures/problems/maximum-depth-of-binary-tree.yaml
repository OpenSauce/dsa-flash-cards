title: Maximum Depth of Binary Tree
difficulty: easy
tags: [tree, dfs]
description: |
  Given the root of a binary tree, return its maximum depth.

  The maximum depth is the number of nodes along the longest path from the
  root node down to the farthest leaf node. A tree with only a root has
  depth 1. An empty tree has depth 0.
examples:
  - input: "root = [3,9,20,null,null,15,7]"
    output: "3"
    explanation: "The longest path is 3 → 20 → 15 (or 3 → 20 → 7), which has 3 nodes."
  - input: "root = [1,null,2]"
    output: "2"
    explanation: "The tree has two levels: the root and its right child."
  - input: "root = []"
    output: "0"
    explanation: "An empty tree has depth 0."
constraints:
  - "0 <= number of nodes <= 10^4"
  - "-100 <= Node.val <= 100"
