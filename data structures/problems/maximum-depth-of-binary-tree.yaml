solution:
  python: |
    from typing import Optional

    class TreeNode:
        def __init__(self, val=0, left=None, right=None):
            self.val = val
            self.left = left
            self.right = right

    def max_depth(root: Optional[TreeNode]) -> int:
        if root is None:
            return 0
        return 1 + max(max_depth(root.left), max_depth(root.right))
  javascript: |
    class TreeNode {
      constructor(val = 0, left = null, right = null) {
        this.val = val;
        this.left = left;
        this.right = right;
      }
    }

    function maxDepth(root) {
      if (root === null) return 0;
      return 1 + Math.max(maxDepth(root.left), maxDepth(root.right));
    }
  go: |
    package main

    type TreeNode struct {
        Val   int
        Left  *TreeNode
        Right *TreeNode
    }

    func maxDepth(root *TreeNode) int {
        if root == nil {
            return 0
        }
        left := maxDepth(root.Left)
        right := maxDepth(root.Right)
        if left > right {
            return 1 + left
        }
        return 1 + right
    }
  java: |
    class TreeNode {
        int val;
        TreeNode left;
        TreeNode right;
        TreeNode(int val) { this.val = val; }
    }

    public int maxDepth(TreeNode root) {
        if (root == null) return 0;
        return 1 + Math.max(maxDepth(root.left), maxDepth(root.right));
    }
hints:
  - "Think about how the depth of a tree relates to the depth of its subtrees."
  - "The depth of a tree is 1 plus the maximum of its left and right subtree depths. Use recursion with a base case of 0 for null nodes."
