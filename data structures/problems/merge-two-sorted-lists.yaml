title: Merge Two Sorted Lists
difficulty: easy
tags: [linked-list]
description: |
  You are given the heads of two sorted singly linked lists. Merge them
  into a single sorted linked list by splicing the nodes together, and
  return the head of the merged list.
examples:
  - input: "list1 = [1,2,4], list2 = [1,3,4]"
    output: "[1,1,2,3,4,4]"
    explanation: "Nodes from both lists are interleaved in sorted order."
  - input: "list1 = [], list2 = [0]"
    output: "[0]"
    explanation: "Merging an empty list with a non-empty list returns the non-empty list."
constraints:
  - "0 <= list length <= 50"
  - "-100 <= Node.val <= 100"
  - "Both lists are sorted in non-decreasing order."
