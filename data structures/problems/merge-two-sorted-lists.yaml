test_cases:
  - input: { list1: [1, 2, 4], list2: [1, 3, 4] }
    expected: [1, 1, 2, 3, 4, 4]
  - input: { list1: [], list2: [] }
    expected: []
  - input: { list1: [], list2: [0] }
    expected: [0]
  - input: { list1: [5], list2: [1, 2, 3] }
    expected: [1, 2, 3, 5]
solution:
  python: |
    from typing import Optional

    class ListNode:
        def __init__(self, val=0, next=None):
            self.val = val
            self.next = next

    def merge_two_lists(list1: Optional[ListNode], list2: Optional[ListNode]) -> Optional[ListNode]:
        dummy = ListNode(0)
        current = dummy
        while list1 and list2:
            if list1.val <= list2.val:
                current.next = list1
                list1 = list1.next
            else:
                current.next = list2
                list2 = list2.next
            current = current.next
        current.next = list1 if list1 else list2
        return dummy.next
  javascript: |
    class ListNode {
        constructor(val = 0, next = null) {
            this.val = val;
            this.next = next;
        }
    }

    function mergeTwoLists(list1, list2) {
        const dummy = new ListNode(0);
        let current = dummy;
        while (list1 && list2) {
            if (list1.val <= list2.val) {
                current.next = list1;
                list1 = list1.next;
            } else {
                current.next = list2;
                list2 = list2.next;
            }
            current = current.next;
        }
        current.next = list1 || list2;
        return dummy.next;
    }
  go: |
    type ListNode struct {
        Val  int
        Next *ListNode
    }

    func mergeTwoLists(list1 *ListNode, list2 *ListNode) *ListNode {
        dummy := &ListNode{}
        current := dummy
        for list1 != nil && list2 != nil {
            if list1.Val <= list2.Val {
                current.Next = list1
                list1 = list1.Next
            } else {
                current.Next = list2
                list2 = list2.Next
            }
            current = current.Next
        }
        if list1 != nil {
            current.Next = list1
        } else {
            current.Next = list2
        }
        return dummy.Next
    }
  java: |
    public ListNode mergeTwoLists(ListNode list1, ListNode list2) {
        ListNode dummy = new ListNode(0);
        ListNode current = dummy;
        while (list1 != null && list2 != null) {
            if (list1.val <= list2.val) {
                current.next = list1;
                list1 = list1.next;
            } else {
                current.next = list2;
                list2 = list2.next;
            }
            current = current.next;
        }
        current.next = (list1 != null) ? list1 : list2;
        return dummy.next;
    }
hints:
  - "Use a dummy head node so you do not need special logic for the first element."
  - "Compare the values at the front of both lists. Attach the smaller one to your result and advance that list's pointer. Repeat until one list is exhausted."
  - "When one list runs out, attach the remainder of the other list directly."
