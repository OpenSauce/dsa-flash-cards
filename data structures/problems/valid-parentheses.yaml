title: Valid Parentheses
difficulty: easy
tags: [stack, string]
description: |
  Given a string `s` containing only the characters `(`, `)`, `{`, `}`,
  `[` and `]`, determine if the input string has valid bracket pairing.

  A string is valid if every opening bracket has a corresponding closing
  bracket of the same type, and brackets are closed in the correct order.
examples:
  - input: "s = '()'"
    output: "true"
    explanation: "Single pair of matching parentheses."
  - input: "s = '([)]'"
    output: "false"
    explanation: "Brackets are closed in the wrong order."
  - input: "s = '{[]}'"
    output: "true"
    explanation: "Nested brackets are properly matched."
constraints:
  - "0 <= s.length <= 10^4"
  - "s consists only of parentheses characters: ()[]{}."
starter_code:
  python: |
    def is_valid(s: str) -> bool:
        pass
  javascript: |
    function isValid(s) {
    }
  go: |
    func isValid(s string) bool {
    }
  java: |
    public boolean isValid(String s) {
    }
test_cases:
  - input: { s: "()" }
    expected: true
  - input: { s: "()[]{}" }
    expected: true
  - input: { s: "(]" }
    expected: false
  - input: { s: "([)]" }
    expected: false
  - input: { s: "{[]}" }
    expected: true
  - input: { s: "" }
    expected: true
solution:
  python: |
    def is_valid(s: str) -> bool:
        stack = []
        pairs = {')': '(', ']': '[', '}': '{'}
        for char in s:
            if char in pairs:
                if not stack or stack[-1] != pairs[char]:
                    return False
                stack.pop()
            else:
                stack.append(char)
        return len(stack) == 0
  javascript: |
    function isValid(s) {
        const stack = [];
        const pairs = {')': '(', ']': '[', '}': '{'};
        for (const char of s) {
            if (char in pairs) {
                if (stack.length === 0 || stack[stack.length - 1] !== pairs[char]) {
                    return false;
                }
                stack.pop();
            } else {
                stack.push(char);
            }
        }
        return stack.length === 0;
    }
  go: |
    func isValid(s string) bool {
        stack := []byte{}
        pairs := map[byte]byte{')': '(', ']': '[', '}': '{'}
        for i := 0; i < len(s); i++ {
            ch := s[i]
            if opener, ok := pairs[ch]; ok {
                if len(stack) == 0 || stack[len(stack)-1] != opener {
                    return false
                }
                stack = stack[:len(stack)-1]
            } else {
                stack = append(stack, ch)
            }
        }
        return len(stack) == 0
    }
  java: |
    public boolean isValid(String s) {
        java.util.Deque<Character> stack = new java.util.ArrayDeque<>();
        java.util.Map<Character, Character> pairs = java.util.Map.of(')', '(', ']', '[', '}', '{');
        for (char ch : s.toCharArray()) {
            if (pairs.containsKey(ch)) {
                if (stack.isEmpty() || !stack.peek().equals(pairs.get(ch))) {
                    return false;
                }
                stack.pop();
            } else {
                stack.push(ch);
            }
        }
        return stack.isEmpty();
    }
hints:
  - "What data structure follows a last-in, first-out order?"
  - "Push opening brackets onto a stack. When you encounter a closing bracket, check if the top of the stack is the matching opener."
  - "After processing all characters, the stack should be empty if the string is valid."
