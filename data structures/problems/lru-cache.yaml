solution:
  python: |
    class LRUCache:
        def __init__(self, capacity: int):
            self.capacity = capacity
            self.cache = {}
            self.head = {"prev": None, "next": None}
            self.tail = {"prev": None, "next": None}
            self.head["next"] = self.tail
            self.tail["prev"] = self.head

        def _remove(self, node):
            node["prev"]["next"] = node["next"]
            node["next"]["prev"] = node["prev"]

        def _add_to_front(self, node):
            node["next"] = self.head["next"]
            node["prev"] = self.head
            self.head["next"]["prev"] = node
            self.head["next"] = node

        def get(self, key: int) -> int:
            if key not in self.cache:
                return -1
            node = self.cache[key]
            self._remove(node)
            self._add_to_front(node)
            return node["val"]

        def put(self, key: int, value: int) -> None:
            if key in self.cache:
                self._remove(self.cache[key])
            node = {"key": key, "val": value, "prev": None, "next": None}
            self.cache[key] = node
            self._add_to_front(node)
            if len(self.cache) > self.capacity:
                lru = self.tail["prev"]
                self._remove(lru)
                del self.cache[lru["key"]]
  javascript: |
    class LRUCache {
        constructor(capacity) {
            this.capacity = capacity;
            this.cache = new Map();
        }

        get(key) {
            if (!this.cache.has(key)) return -1;
            const val = this.cache.get(key);
            this.cache.delete(key);
            this.cache.set(key, val);
            return val;
        }

        put(key, value) {
            if (this.cache.has(key)) this.cache.delete(key);
            this.cache.set(key, value);
            if (this.cache.size > this.capacity) {
                const oldest = this.cache.keys().next().value;
                this.cache.delete(oldest);
            }
        }
    }
  go: |
    type entry struct {
        key, val   int
        prev, next *entry
    }

    type LRUCache struct {
        capacity   int
        cache      map[int]*entry
        head, tail *entry
    }

    func Constructor(capacity int) LRUCache {
        h := &entry{}
        t := &entry{}
        h.next = t
        t.prev = h
        return LRUCache{capacity: capacity, cache: make(map[int]*entry), head: h, tail: t}
    }

    func (c *LRUCache) remove(e *entry) {
        e.prev.next = e.next
        e.next.prev = e.prev
    }

    func (c *LRUCache) addFront(e *entry) {
        e.next = c.head.next
        e.prev = c.head
        c.head.next.prev = e
        c.head.next = e
    }

    func (c *LRUCache) Get(key int) int {
        if e, ok := c.cache[key]; ok {
            c.remove(e)
            c.addFront(e)
            return e.val
        }
        return -1
    }

    func (c *LRUCache) Put(key int, value int) {
        if e, ok := c.cache[key]; ok {
            c.remove(e)
            e.val = value
            c.addFront(e)
            return
        }
        e := &entry{key: key, val: value}
        c.cache[key] = e
        c.addFront(e)
        if len(c.cache) > c.capacity {
            lru := c.tail.prev
            c.remove(lru)
            delete(c.cache, lru.key)
        }
    }
  java: |
    import java.util.HashMap;

    public class LRUCache {
        private int capacity;
        private HashMap<Integer, Integer> cache;
        private java.util.LinkedList<Integer> order;

        public LRUCache(int capacity) {
            this.capacity = capacity;
            this.cache = new HashMap<>();
            this.order = new java.util.LinkedList<>();
        }

        public int get(int key) {
            if (!cache.containsKey(key)) return -1;
            order.remove(Integer.valueOf(key));
            order.addFirst(key);
            return cache.get(key);
        }

        public void put(int key, int value) {
            if (cache.containsKey(key)) {
                order.remove(Integer.valueOf(key));
            } else if (cache.size() == capacity) {
                int oldest = order.removeLast();
                cache.remove(oldest);
            }
            order.addFirst(key);
            cache.put(key, value);
        }
    }
hints:
  - "You need O(1) lookup (hash map) and O(1) insertion/removal from an ordered structure (doubly linked list)."
  - "Combine a hash map (key -> node) with a doubly linked list. The list tracks usage order — most recent at the front, least recent at the back. On get or put, move the node to the front. On eviction, remove from the back."
  - "Use sentinel head and tail nodes to avoid null-check edge cases when adding or removing nodes."
