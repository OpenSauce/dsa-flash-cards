title: LRU Cache
difficulty: hard
tags: [linked-list, hash-map, design]
description: |
  Design a data structure that implements a Least Recently Used (LRU) cache.

  Implement the `LRUCache` class:
  - `LRUCache(capacity)` — initialize the cache with a positive integer capacity.
  - `get(key)` — return the value associated with the key if it exists, otherwise return -1.
  - `put(key, value)` — insert or update the key-value pair. If the cache exceeds its capacity, evict the least recently used key before inserting.

  Both `get` and `put` must run in O(1) average time.
examples:
  - input: "ops = ['LRUCache','put','put','get','put','get','put','get','get','get'], args = [[2],[1,1],[2,2],[1],[3,3],[2],[4,4],[1],[3],[4]]"
    output: "[null,null,null,1,null,-1,null,-1,3,4]"
    explanation: "Cache with capacity 2. After putting keys 1 and 2, get(1) returns 1. Putting key 3 evicts key 2. get(2) returns -1 (evicted). Putting key 4 evicts key 1."
constraints:
  - "1 <= capacity <= 3000"
  - "0 <= key <= 10^4"
  - "0 <= value <= 10^5"
  - "At most 2 * 10^5 total calls to get and put."
