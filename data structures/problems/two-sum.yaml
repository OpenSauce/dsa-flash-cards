title: Two Sum
difficulty: easy
tags: [hash-map, array]
description: |
  Given an array of integers `nums` and an integer `target`, return the
  indices of the two numbers that add up to `target`.

  You may assume each input has exactly one solution, and you may not
  use the same element twice.
examples:
  - input: "nums = [2,7,11,15], target = 9"
    output: "[0,1]"
    explanation: "nums[0] + nums[1] == 9"
  - input: "nums = [3,2,4], target = 6"
    output: "[1,2]"
    explanation: "nums[1] + nums[2] == 6"
constraints:
  - "2 <= nums.length <= 10^4"
  - "-10^9 <= nums[i] <= 10^9"
  - "Exactly one valid answer exists."
starter_code:
  python: |
    def two_sum(nums: list[int], target: int) -> list[int]:
        pass
test_cases:
  - input: { nums: [2, 7, 11, 15], target: 9 }
    expected: [0, 1]
  - input: { nums: [3, 2, 4], target: 6 }
    expected: [1, 2]
  - input: { nums: [3, 3], target: 6 }
    expected: [0, 1]
solution:
  python: |
    def two_sum(nums: list[int], target: int) -> list[int]:
        seen = {}
        for i, num in enumerate(nums):
            complement = target - num
            if complement in seen:
                return [seen[complement], i]
            seen[num] = i
hints:
  - "Think about what data structure lets you look up values in O(1)."
  - "For each number, calculate what value you would need to find to reach the target, then check if you have seen it before."
