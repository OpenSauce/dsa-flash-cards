title: Two Sum
difficulty: easy
tags: [hash-map, array]
description: |
  Given an array of integers `nums` and an integer `target`, return the
  indices of the two numbers that add up to `target`.

  You may assume each input has exactly one solution, and you may not
  use the same element twice.
examples:
  - input: "nums = [2,7,11,15], target = 9"
    output: "[0,1]"
    explanation: "nums[0] + nums[1] == 9"
  - input: "nums = [3,2,4], target = 6"
    output: "[1,2]"
    explanation: "nums[1] + nums[2] == 6"
constraints:
  - "2 <= nums.length <= 10^4"
  - "-10^9 <= nums[i] <= 10^9"
  - "Exactly one valid answer exists."
starter_code:
  python: |
    def two_sum(nums: list[int], target: int) -> list[int]:
        pass
  javascript: |
    function twoSum(nums, target) {
    }
  go: |
    func twoSum(nums []int, target int) []int {
    }
  java: |
    public int[] twoSum(int[] nums, int target) {
    }
test_cases:
  - input: { nums: [2, 7, 11, 15], target: 9 }
    expected: [0, 1]
  - input: { nums: [3, 2, 4], target: 6 }
    expected: [1, 2]
  - input: { nums: [3, 3], target: 6 }
    expected: [0, 1]
  - input: { nums: [-1, -2, -3, -4, -5], target: -8 }
    expected: [2, 4]
  - input: { nums: [1, -1], target: 0 }
    expected: [0, 1]
solution:
  python: |
    def two_sum(nums: list[int], target: int) -> list[int]:
        seen = {}
        for i, num in enumerate(nums):
            complement = target - num
            if complement in seen:
                return [seen[complement], i]
            seen[num] = i
  javascript: |
    function twoSum(nums, target) {
        const seen = {};
        for (let i = 0; i < nums.length; i++) {
            const complement = target - nums[i];
            if (complement in seen) {
                return [seen[complement], i];
            }
            seen[nums[i]] = i;
        }
    }
  go: |
    func twoSum(nums []int, target int) []int {
        seen := map[int]int{}
        for i, num := range nums {
            complement := target - num
            if j, ok := seen[complement]; ok {
                return []int{j, i}
            }
            seen[num] = i
        }
        return nil
    }
  java: |
    public int[] twoSum(int[] nums, int target) {
        java.util.Map<Integer, Integer> seen = new java.util.HashMap<>();
        for (int i = 0; i < nums.length; i++) {
            int complement = target - nums[i];
            if (seen.containsKey(complement)) {
                return new int[]{seen.get(complement), i};
            }
            seen.put(nums[i], i);
        }
        return new int[]{};
    }
hints:
  - "Think about what data structure lets you look up values in O(1)."
  - "For each number, calculate what value you would need to find to reach the target, then check if you have seen it before."
