title: Kth Smallest Element in BST
difficulty: medium
tags: [tree, dfs]
description: |
  Given the root of a binary search tree and an integer `k`, return the
  kth smallest value (1-indexed) among all node values in the tree.

  Because the tree is a BST, an inorder traversal visits nodes in
  ascending order. Use this property to find the answer efficiently.
examples:
  - input: "root = [3,1,4,null,2], k = 1"
    output: "1"
    explanation: "The sorted values are [1,2,3,4]. The 1st smallest is 1."
  - input: "root = [5,3,6,2,4,null,null,1], k = 3"
    output: "3"
    explanation: "The sorted values are [1,2,3,4,5,6]. The 3rd smallest is 3."
constraints:
  - "1 <= k <= number of nodes <= 10^4"
  - "0 <= Node.val <= 10^4"
