solution:
  python: |
    from typing import Optional

    class TreeNode:
        def __init__(self, val=0, left=None, right=None):
            self.val = val
            self.left = left
            self.right = right

    def kth_smallest(root: Optional[TreeNode], k: int) -> int:
        stack = []
        node = root
        count = 0
        while stack or node:
            while node:
                stack.append(node)
                node = node.left
            node = stack.pop()
            count += 1
            if count == k:
                return node.val
            node = node.right
        return -1
  javascript: |
    class TreeNode {
      constructor(val = 0, left = null, right = null) {
        this.val = val;
        this.left = left;
        this.right = right;
      }
    }

    function kthSmallest(root, k) {
      const stack = [];
      let node = root;
      let count = 0;
      while (stack.length > 0 || node !== null) {
        while (node !== null) {
          stack.push(node);
          node = node.left;
        }
        node = stack.pop();
        count++;
        if (count === k) return node.val;
        node = node.right;
      }
      return -1;
    }
  go: |
    package main

    type TreeNode struct {
        Val   int
        Left  *TreeNode
        Right *TreeNode
    }

    func kthSmallest(root *TreeNode, k int) int {
        stack := []*TreeNode{}
        node := root
        count := 0
        for len(stack) > 0 || node != nil {
            for node != nil {
                stack = append(stack, node)
                node = node.Left
            }
            node = stack[len(stack)-1]
            stack = stack[:len(stack)-1]
            count++
            if count == k {
                return node.Val
            }
            node = node.Right
        }
        return -1
    }
  java: |
    import java.util.*;

    class TreeNode {
        int val;
        TreeNode left;
        TreeNode right;
        TreeNode(int val) { this.val = val; }
    }

    public int kthSmallest(TreeNode root, int k) {
        Deque<TreeNode> stack = new ArrayDeque<>();
        TreeNode node = root;
        int count = 0;
        while (!stack.isEmpty() || node != null) {
            while (node != null) {
                stack.push(node);
                node = node.left;
            }
            node = stack.pop();
            count++;
            if (count == k) return node.val;
            node = node.right;
        }
        return -1;
    }
