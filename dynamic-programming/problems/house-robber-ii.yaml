title: House Robber II
difficulty: medium
tags: [dynamic-programming]
description: |
  This is a follow-up to the House Robber problem. All houses are now
  arranged in a circle, meaning the first and last houses are adjacent.
  You still cannot rob two adjacent houses.

  Given a list of non-negative integers representing the money in each
  house, return the maximum amount you can rob without triggering
  the alarm.
examples:
  - input: "nums = [2,3,2]"
    output: "3"
    explanation: "You cannot rob house 0 and house 2 because they are adjacent in the circle. The best option is house 1 (3)."
  - input: "nums = [1,2,3,1]"
    output: "4"
    explanation: "Rob house 0 (1) and house 2 (3) for a total of 4."
  - input: "nums = [1,2,3]"
    output: "3"
    explanation: "Rob house 2 (3). Robbing houses 0 and 2 is not allowed since they are neighbors in the circle."
constraints:
  - "1 <= nums.length <= 100"
  - "0 <= nums[i] <= 1000"
starter_code:
  python: |
    def rob(nums: list[int]) -> int:
        pass
  javascript: |
