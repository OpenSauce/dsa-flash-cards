title: Longest Increasing Subsequence
difficulty: medium
tags: [dynamic-programming]
description: |
  Given an array of integers `nums`, return the length of the longest
  strictly increasing subsequence.

  A subsequence is derived from the array by deleting some or no elements
  without changing the order of the remaining elements. For example,
  `[3,6,7]` is a subsequence of `[0,3,1,6,2,7]`.
examples:
  - input: "nums = [10,9,2,5,3,7,101,18]"
    output: "4"
    explanation: "One longest increasing subsequence is [2,3,7,101], which has length 4."
  - input: "nums = [0,1,0,3,2,3]"
    output: "4"
    explanation: "One longest increasing subsequence is [0,1,2,3]."
  - input: "nums = [7,7,7,7,7]"
    output: "1"
    explanation: "The sequence must be strictly increasing, so each element alone is the longest."
constraints:
  - "1 <= nums.length <= 2500"
  - "-10^4 <= nums[i] <= 10^4"
starter_code:
